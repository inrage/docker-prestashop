name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.2', '7.4', '8.0']

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: PHP_VERSION=${{ matrix.php }}
          tags: inrage/docker-prestashop:${{ matrix.php }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag-latest:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: |
          docker pull inrage/docker-prestashop:7.4
          docker tag inrage/docker-prestashop:7.4 inrage/docker-prestashop:latest
          docker push inrage/docker-prestashop:latest
